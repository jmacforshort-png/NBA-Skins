name: Daily NBA Skins Update

on:
  schedule:
    - cron: "15 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update data
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
        run: node scripts/update-data.js

      - name: Commit changes
        run: |
          if git diff --quiet data.json; then
            echo "No updates"
            exit 0
          fi
          git pull --rebase --autostash
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Daily data update"
          git push
